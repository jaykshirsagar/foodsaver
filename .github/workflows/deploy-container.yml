name: Build and Publish Container

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: .env
    env:
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY || vars.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN || vars.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID || vars.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET || vars.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID || vars.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID || vars.EXPO_PUBLIC_FIREBASE_APP_ID }}
      EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID || vars.EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Validate Firebase build variables
        shell: bash
        run: |
          required=(
            EXPO_PUBLIC_FIREBASE_API_KEY
            EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN
            EXPO_PUBLIC_FIREBASE_PROJECT_ID
            EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET
            EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
            EXPO_PUBLIC_FIREBASE_APP_ID
          )

          missing=0
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "Missing required variable: $name"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "One or more Firebase variables are missing."
            exit 1
          fi

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            EXPO_PUBLIC_FIREBASE_API_KEY=${{ env.EXPO_PUBLIC_FIREBASE_API_KEY }}
            EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ env.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            EXPO_PUBLIC_FIREBASE_PROJECT_ID=${{ env.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
            EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ env.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
            EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ env.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            EXPO_PUBLIC_FIREBASE_APP_ID=${{ env.EXPO_PUBLIC_FIREBASE_APP_ID }}
            EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ env.EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID }}
